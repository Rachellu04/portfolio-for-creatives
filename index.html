<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading</title>

  <style>
    body {
      margin: 0;
      font-family: 'Mona Sans', sans-serif;
      background: #fff;
      overflow: hidden;
    }

    /* Loader overlay */
    .loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;

      transition: opacity 0.6s ease;
    }

    /* Circle wrapper */
    .loader-circle {
      position: relative;
      width: 120px;
      height: 120px;
    }

    svg {
      transform: rotate(-90deg);
      width: 120px;
      height: 120px;
    }

    .track {
      fill: none;
      stroke: #eee;
      stroke-width: 2;
    }

    .progress {
      fill: none;
      stroke: #000;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 276;
      stroke-dashoffset: 276;
      transition: stroke-dashoffset 0.15s linear;
    }

    .loader-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    /* Exit animation state */
    .loader.exit {
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
    }
  </style>
</head>

<body>

<div class="loader" id="loader">
  <div class="loader-circle">
    <svg viewBox="0 0 100 100">
      <circle class="track" cx="50" cy="50" r="44"></circle>
      <circle class="progress" cx="50" cy="50" r="44" id="circle"></circle>
    </svg>
    <div class="loader-text" id="text">0%</div>
  </div>
</div>

<script>
  let progress = 0;

  const text = document.getElementById("text");
  const circle = document.getElementById("circle");
  const loader = document.getElementById("loader");

  const circumference = 276;

  function animate() {
    if (progress <= 100) {
      text.textContent = Math.floor(progress) + "%";

      const offset = circumference - (progress / 100) * circumference;
      circle.style.strokeDashoffset = offset;

      // non-linear motion (feels more natural)
      progress += Math.random() * 2.5;

      setTimeout(animate, 18);
    } else {
      finish();
    }
  }

  function finish() {
    // slight pause at 100%
    setTimeout(() => {

      // exit animation
      loader.classList.add("exit");

      // redirect AFTER animation completes
      setTimeout(() => {
        window.location.href = "work.html";
      }, 900);

    }, 300);
  }

  animate();
</script>

</body>
</html>
